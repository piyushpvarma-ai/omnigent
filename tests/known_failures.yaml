# Tests skipped because they're flaky on CI or have a known
# regression on `main`. Each entry MUST link to a tracking
# issue so we know who owns the resolution and when to remove
# the entry.
#
# Fields:
#   id      — pytest nodeid, e.g. `tests/foo/test_bar.py::test_x`.
#   reason  — one-line description shown in pytest output.
#   issue   — tracking issue number.
#   cluster — similarity bucket / suspected shared root cause.
#             This is intentionally independent of `issue`: a large
#             umbrella issue can contain multiple clusters, and `issue: 0`
#             means a tracking issue still needs to be filed for that bucket.
#   mode    — `skip` (default) or `xfail`.
#             - skip:  test does not run.
#             - xfail: test runs; failure reports as XFAIL (silent),
#                      a passing test reports XPASS so we can
#                      drop the entry. Use for tests we expect to
#                      get fixed (real regressions). Use `skip`
#                      for tests that are flaky-but-unowned.
#
# To add: append a `- id: ... reason: ... issue: ...` block.
# To remove: delete the block. (`pytest_collection_modifyitems`
# emits a warning at session start for any entry whose `id`
# doesn't match a collected test, so stale entries surface.)
#
# Note: entries here apply to every pytest invocation. If you
# want to debug a skipped test locally, comment out its block.
skips:

  - id: tests/e2e/omnigent/test_run_harness_without_agent_e2e.py::test_run_harness_without_agent_live_repl_round_trip[claude-sdk]
    reason: "Hangs >180s in CI -> xdist worker crash even on the mock LLM (#796 migration): the claude-sdk native claude-code CLI calls auth/metadata endpoints the mock server does not serve, so its headless -p turn never completes. Distinct from the stale-glyph fix that greened the openai-agents/codex rows; claude-sdk is mock-incompatible and should be excluded from the mock matrix (or the mock taught to serve the claude-code endpoints). Not the old live-gateway hang (that was removed by the mock migration)."
    issue: 523
    cluster: mock-claude-sdk-cli-unsupported
    mode: skip

  - id: tests/e2e/omnigent/test_run_harness_without_agent_e2e.py::test_run_harness_without_agent_live_repl_round_trip[pi]
    reason: "No-AGENT `omnigent run --harness` live round-trip crashes the xdist worker — same family as the [claude-sdk]/[codex]/[openai-agents] siblings. Surfaced once pi was enabled in CI (PR #809); previously the [pi] row skipped because the pi CLI was absent. See [claude-sdk] entry for the full diagnosis."
    issue: 523
    cluster: no-agent-harness-roundtrip-hang
    mode: skip




  - id: tests/e2e/omnigent/test_yaml_hello_world.py::test_yaml_agent_with_tools[pi]
    reason: "pi harness does not complete the headless `-p` tool round-trip: it makes only ONE LLM request (receives the forced calculate tool_call) then exits 0 with empty stdout — the tool is never dispatched and no follow-up call is made. Distinct from #677 (stale stdout-marker expectation, fixed for the claude-sdk/codex/openai-agents rows). See #807 for the full diagnosis."
    issue: 807
    cluster: pi-headless-tool-roundtrip
    mode: skip
